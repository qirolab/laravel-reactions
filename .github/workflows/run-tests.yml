name: Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

        # Keep only currently supported / realistic versions
        php: ['8.1', '8.2', '8.3', '8.4']

        # Laravel versions that actually exist/stable
        laravel: ['10.*', '11.*', '12.*']

        stability: [prefer-lowest, prefer-stable]

        exclude:
          # Laravel 11 requires PHP 8.2+
          - laravel: 11.*
            php: '8.1'

          # Laravel 12 requires PHP 8.2+
          - laravel: 12.*
            php: '8.1'

          # prefer-lowest usually skipped for latest major
          - laravel: 12.*
            stability: prefer-lowest

        include:
          - laravel: 10.*
            testbench: 8.*

          - laravel: 11.*
            testbench: 9.*

          - laravel: 12.*
            testbench: 10.*

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.stability }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: >
            dom, curl, libxml, mbstring, zip, pcntl,
            pdo, sqlite, pdo_sqlite, bcmath,
            soap, intl, gd, exif, iconv, imagick, fileinfo

      - name: Validate composer.json
        run: composer validate --strict --no-check-lock

      - name: Install dependencies
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --dev \
            --no-interaction \
            --no-update

          composer update \
            --${{ matrix.stability }} \
            --prefer-dist \
            --no-interaction \
            -W

      - name: Execute tests
        run: vendor/bin/phpunit
